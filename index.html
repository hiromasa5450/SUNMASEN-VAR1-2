// 下スマッシュの地面棒：地面から伸びて引っ込む
function drawPole(ctx, po) {
  const t = (po.t !== undefined) ? po.t : 6;
  const rise = Math.min(1, (t + 1) / (POLE_ACT0 + 1));
  const retract = t <= POLE_ACT1 ? 1 : Math.max(0, 1 - (t - POLE_ACT1) / (POLE_LIFE - POLE_ACT1));
  const mx = po.max, sm = po.sizeMul || 1;   // smはBIG巨大化の倍率
  const mul = (mx ? 2 : 1) * sm, hw = POLE_HW * (mx ? 1.7 : 1) * sm;   // 95%以上は2倍長さ・太判定
  if (po.side) {   // 横向きの棒（横スマッシュ）
    const len = POLE_H * mul * Math.min(rise, retract);
    if (len <= 1) return;
    const bx = po.face > 0 ? po.x : po.x - len, by = po.y - 42 - hw;
    ctx.save();
    if (mx) { ctx.shadowColor = '#ff2d2d'; ctx.shadowBlur = 14; }
    ctx.fillStyle = mx ? '#ff3030' : '#9aa6bd'; ctx.strokeStyle = mx ? '#9c0f0f' : '#454f66'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
    roundRect(ctx, bx, by, len, hw * 2, 6); ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = mx ? '#ffd0d0' : '#d7dfee'; ctx.fillRect(bx + 3, by + 4, len - 6, 4);   // ハイライト
    ctx.restore();
    return;
  }
  const maxH = (po.down ? POLE_H_DOWN : POLE_H) * mul;
  const hgt = maxH * Math.min(rise, retract);
  if (hgt <= 1) return;
  const ry = po.down ? po.y : po.y - hgt;   // 下スマッシュは下へ貫通、上スマッシュは上へ伸びる
  ctx.save();
  if (mx) { ctx.shadowColor = '#ff2d2d'; ctx.shadowBlur = 14; }
  ctx.fillStyle = mx ? '#ff3030' : '#9aa6bd'; ctx.strokeStyle = mx ? '#9c0f0f' : '#454f66'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
  roundRect(ctx, po.x - hw, ry, hw * 2, hgt, 6); ctx.fill(); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = mx ? '#ffd0d0' : '#d7dfee'; ctx.fillRect(po.x - hw + 4, ry + 3, 4, hgt - 6);   // ハイライト
  ctx.restore();
}
// 設置された爆弾（導火線が点滅、爆発間近で速く・赤く）
function drawBomb(ctx, b) {

/* ======================= 10. World（試合進行） ======================= */
class World {
  constructor(fighters, opts = {}) {
    this.fighters = fighters;
    this.projectiles = [];
    this.doodles = [];                    // Q2の白線（落書き）
    this.bananas = [];                    // BANANAの設置バナナ
    this.bombs = [];                      // 武器ボムの設置爆弾
    this.poles = [];                      // 下スマッシュの地面棒
    this.blindTimer = 0; this.blindOwner = 0; this.blindQuote = 0;   // BLIND：残りフレーム／発動者eid／表示する名言index
    this.sunTimer = 0; this.sunOwner = 0;   // TAIYOU：目つぶし残りフレーム／発動者eid
    this.training = !!opts.training;
    this.over = false; this.winner = null;
    this.placements = [];                 // 脱落順（後ろが上位）
    let i = 0; for (const f of fighters) f.reset(SPAWN[i++ % SPAWN.length]);
  }
  onPlayerOut(f) {
    this.placements.push(f);
    if (this.training) return;            // トレーニングは脱落なし扱い
    const alive = this.fighters.filter(x => !x.dead && !x.isClone);
    if (alive.length <= 1) {
      this.over = true;
      this.winner = alive[0] || f;
      Sound.play('se_win');
    }
  }
  update() {
    for (const f of this.fighters) {
      const ctrl = f.controller;          // 各fighterに割り当てた入力源
      ctrl.poll(f, this);                 // held/edge を更新
      f.update(this, ctrl);
    }
    // 近接ヒット解決
    for (const a of this.fighters) {
      const hb = a.attackHitbox(); if (!hb) continue;
      for (const b of this.fighters) {
        if (b === a || b.dead || a.attack.hit.has(b.eid)) continue;
        if (a.isClone && b.eid === a.ownerEid) continue;   // 分身→オーナーには当たらない
        if (rectsOverlap(hb, b.bodyRect())) {
          a.attack.hit.add(b.eid);
          b.receiveHit(a.attack.move, a, this);
        }
      }
      // 攻撃でボムを弾く（攻撃の向きへ飛ばす）
      for (const bo of this.bombs) {
        if (a.attack.hit.has(bo)) continue;
        if (rectsOverlap(hb, { x: bo.x - 14, y: bo.y - 28, w: 28, h: 28 })) {
          a.attack.hit.add(bo);
          const dir = (a.x <= bo.x) ? 1 : -1;
          bo.vx = dir * 9; bo.vy = -5;
          Sound.play('se_weapon_hit');
        }
      }
    }
    for (let i = this.projectiles.length - 1; i >= 0; i--) {
      this.projectiles[i].update(this);
      if (this.projectiles[i].dead) this.projectiles.splice(i, 1);
    }
    for (let i = this.doodles.length - 1; i >= 0; i--) {
      this.doodles[i].update(this);
      if (this.doodles[i].life <= 0) this.doodles.splice(i, 1);
    }
    // 下スマッシュの地面棒：出ている間、近くの相手（設置者以外）を上方向に打ち上げ
    for (let i = this.poles.length - 1; i >= 0; i--) {
      const po = this.poles[i];
      po.t++;
      if (po.t >= POLE_ACT0 && po.t <= POLE_ACT1) {
        const atk = { x: po.x, def: { atk: 1 }, superPower: 0, reverseMode: 0, weapon: 'bare' };
        const pm = po.kbMul || 1;
        const base = po.side ? POLE_SIDE_MOVE : (po.down ? POLE_DOWN_MOVE : POLE_MOVE);
        const pmove = Object.assign({}, base, { kb: base.kb * pm, kbg: base.kbg * pm });
        const sm = po.sizeMul || 1;                 // BIG巨大化中は3倍
        const len = POLE_H * (po.max ? 2 : 1) * sm; // 95%以上は2倍の長さ（棒二本分）
        const hw = POLE_HW * (po.max ? 1.7 : 1) * sm; // 判定の太さも拡大
        const vRange = (po.max ? 96 : 64) * sm;
        const sideLo = po.side ? Math.min(po.x, po.x + po.face * len) : 0;
        const sideHi = po.side ? Math.max(po.x, po.x + po.face * len) : 0;
        for (const f of this.fighters) {
          if (f.dead || f.respawnTimer > 0 || f.eid === po.ownerEid || po.hit.has(f.eid)) continue;
          const hit = po.side
            ? (f.x > sideLo - 6 && f.x < sideHi + 6 && Math.abs(f.y - po.y) < vRange)                       // 横方向（前方）の相手
            : po.down
            ? (Math.abs(f.x - po.x) < hw + 24 && (f.y - po.y) >= 8 && (f.y - po.y) <= len)                  // 下方（復帰中）の相手
            : (Math.abs(f.x - po.x) < hw + 20 && (f.y - po.y) <= 8 && (f.y - po.y) >= -len);                // 上方の相手
          if (hit) { po.hit.add(f.eid); f.receiveHit(pmove, atk, this); }
        }
      }
      if (po.t >= POLE_LIFE) this.poles.splice(i, 1);
    }
    // ボム：導火線を進め、0で爆発。半径内の全員（設置者本人も）へダメージ＋ノックバック
    for (let i = this.bombs.length - 1; i >= 0; i--) {
      const bo = this.bombs[i];
      // 物理：攻撃で弾かれたら飛ぶ/転がる。足場に着地して止まる
      bo.vx = bo.vx || 0; bo.vy = bo.vy || 0;
      bo.vy += GRAVITY * 0.7; bo.x += bo.vx; bo.y += bo.vy;
      if (bo.vy >= 0 && bo.x > STAGE.main.x1 && bo.x < STAGE.main.x2 && bo.y >= STAGE.main.y) {
        bo.y = STAGE.main.y; bo.vy = bo.vy > 4 ? -bo.vy * 0.25 : 0;   // 速ければ軽くバウンド
        bo.vx *= 0.86; if (Math.abs(bo.vx) < 0.3) bo.vx = 0;
      }
      if (bo.y > STAGE.blastBottom + 80) { this.bombs.splice(i, 1); continue; }   // 場外に落ちたら消滅
      bo.fuse--;
      if (bo.fuse <= 0) {
        const atk = { x: bo.x, def: { atk: 1 }, superPower: 0, reverseMode: 0 };   // 爆心からの簡易攻撃者
        for (const f of this.fighters) {
          if (f.dead || f.respawnTimer > 0) continue;
          if (Math.hypot(f.x - bo.x, (f.y - 33) - (bo.y - 20)) < BOMB_R) f.receiveHit(BOMB_MOVE, atk, this);
        }
        spawnHitSpark(bo.x, bo.y - 20); spawnHitSpark(bo.x - 24, bo.y - 30); spawnHitSpark(bo.x + 24, bo.y - 30);
        Sound.play('se_burst');
        this.bombs.splice(i, 1);
      }
    }
    // バナナ：寿命管理＋接触した相手を滑らせる
    for (let i = this.bananas.length - 1; i >= 0; i--) {
      const ba = this.bananas[i];
      ba.life--;
      let hit = false;
      for (const f of this.fighters) {
        if (f.dead || f.respawnTimer > 0 || f.eid === ba.ownerEid || f.slipped > 0 || f.invincible > 0) continue;
        if (Math.abs(f.x - ba.x) < 22 && Math.abs(f.y - ba.y) < 30) {
          f.slipped = SLIP_DUR;
          f.vx = (f.vx !== 0 ? Math.sign(f.vx) : (f.facing || 1)) * 9;   // 進行方向へツルッと
          f.vy = -4; f.grounded = false;
          Sound.play('se_item_close');
          hit = true; break;
        }
      }
      if (hit || ba.life <= 0) this.bananas.splice(i, 1);
    }
    if (this.blindTimer > 0) this.blindTimer--;   // BLINDの画面妨害
    if (this.sunTimer > 0) this.sunTimer--;       // TAIYOUの目つぶし
    updateSparks();
    if (this.fighters.some(f => f._remove)) this.fighters = this.fighters.filter(f => !f._remove);   // 消えた分身を除去（元プレイヤーは順序維持）
  }
}

// 人間：グローバル Input をそのまま使う
const HumanController = {
  edge:{}, held:{},
  poll(f) {
    this.edge = Input.edge; this.held = Input.held;
  },
  dirX(){ return Input.dirX(); },
  moveX(){ return Input.moveX(); },
  dir(){ return Input.dir(); },
};

// CPU（設計書 14）
class CPUController {
  constructor(mode) { this.mode = mode; this._held = {}; this.edge = {}; this.held = {}; this._t = Math.random()*100; }
  dirX(){ return this.held.right ? 1 : this.held.left ? -1 : 0; }
  moveX(){ return this.dirX(); }
  dir(){ if (this.held.up) return 'up'; if (this.held.down) return 'down'; if (this.held.left||this.held.right) return 'side'; return 'none'; }
  poll(self, world) {
    const prev = Object.assign({}, this.held);
    this.held = { left:false,right:false,up:false,down:false,X:false,Y:false,A:false,B:false,SP:false };
    this._t++;
    if (this.mode === 'static') { this.edge = {}; return; }   // 静止モード（設計書 14）

    // 最も近い敵
    let target = null, best = 1e9;
    for (const o of world.fighters) {
      if (o === self || o.dead || o.respawnTimer > 0) continue;
      if (self.isClone && (o.eid === self.ownerEid || o.isClone)) continue;   // 分身はオーナー/他の分身を狙わない
      const d = Math.abs(o.x - self.x); if (d < best) { best = d; target = o; }
    }
    if (target) {
      const dx = target.x - self.x;
      // 接近
      if (Math.abs(dx) > 60) { if (dx > 0) this.held.right = true; else this.held.left = true; }
      // 台に戻る／上の敵へジャンプ
      if (!self.grounded && self.y > STAGE.main.y - 30 && self.x > STAGE.main.x1 && self.x < STAGE.main.x2) {
        // 落下中：復帰ジャンプ
      }
      if ((self.x < STAGE.main.x1 || self.x > STAGE.main.x2) && self.y > 200 && this._t % 18 === 0) this.held.X = true; // 復帰
      if (target.y < self.y - 60 && this._t % 40 === 0) this.held.X = true;  // 上の敵へ
      // 攻撃（接触したら確率で）
      if (Math.abs(dx) < 70 && Math.abs(target.y - self.y) < 70) {
        if (Math.random() < 0.06) this.held.Y = true;
      }
      // 低確率で武器装備
      if (!self.boxOpen && Math.random() < 0.002) { this.held.A = true; this._wantEquip = 1 + Math.floor(Math.random()*5); }
      if (self.boxOpen) {
        // 適当に選んで装備
        if (Math.random() < 0.3) this.held.A = true;
      }
      // たまにSP
      if (self.spCooldown <= 0 && Math.random() < 0.003) this.held.SP = true;
    }
    this.edge = {};
    for (const k in this.held) this.edge[k] = this.held[k] && !prev[k];
  }
}

// リモート入力（ホスト側：他プレイヤーの入力をRTDBから反映）
class RemoteController {
  constructor() {
    this.held = { left:false,right:false,up:false,down:false,X:false,Y:false,A:false,B:false,SP:false };
    this.edge = {};
    this.data = null;
    this._c = { X:0, Y:0, A:0, B:0, SP:0 };   // 受信したボタン押下カウンタ
    this._bs = 0; this._ma = 0; this._mt = 0;  // 箱選択/算数回答/算数対象 のシーケンス
    this._dr = 0; this._ed = 0;                // 描画ストローク/描画終了 のシーケンス
  }
  setData(d) { this.data = d; }
  dirX(){ return (this.held.right?1:0) - (this.held.left?1:0); }
  moveX(){ return (this.ax != null) ? this.ax : this.dirX(); }  // ネット越しのアナログ横入力
  dir(){ if (this.held.up) return 'up'; if (this.held.down) return 'down'; if (this.held.left||this.held.right) return 'side'; return 'none'; }
  poll(self) {
    const d = this.data || {};
    const prev = Object.assign({}, this.held);
    // B（シールド）は長押し保持、それ以外はカウンタ増分でタップ検出
    this.held = { left:!!d.l, right:!!d.r, up:!!d.u, down:!!d.d, X:false, Y:!!d.sy, A:false, B:!!d.sb, SP:false };
    this.ax = (d.ax != null) ? d.ax / 100 : (this.held.right ? 1 : this.held.left ? -1 : 0);  // アナログ横入力
    this.edge = {};
    for (const k of ['X','Y','A','SP']) {
      const c = d['c' + k] || 0;
      if (c > this._c[k]) { this.edge[k] = true; this.held[k] = true; }
      this._c[k] = c;
    }
    this.edge.left  = this.held.left  && !prev.left;
    this.edge.right = this.held.right && !prev.right;
    this.edge.B = this.held.B && !prev.B;   // 空中スマッシュ用にBの押下エッジを補完
    // タッチ操作（箱選択/算数）のシーケンス検出
    if ((d.bsSeq || 0) > this._bs) { this._bs = d.bsSeq; this.boxPickNew = true; this.boxPickVal = d.bs || 0; }
    if ((d.maSeq || 0) > this._ma) { this._ma = d.maSeq; this.mathAnsNew = true; this.mathAnsVal = d.ma || 0; }
    if ((d.mtSeq || 0) > this._mt) { this._mt = d.mtSeq; this.mathTgtNew = true; this.mathTgtVal = d.mt || 0; }
    if ((d.drSeq || 0) > this._dr) { this._dr = d.drSeq; this.drawNew = true; this.drawPts = (d.dr || []).map(p => ({ x: p[0], y: p[1] })); }
    if ((d.edSeq || 0) > this._ed) { this._ed = d.edSeq; this.endDrawNew = true; }
  }
}

/* ======================= 12. シーン管理 ======================= */
const Game = {
  canvas:null, ctx:null,
  scale:1, ox:0, oy:0,
  scene:'title',
  mode:'training',          // 'training' | 'versus'
  world:null,
  ui:[],                    // 当該フレームのボタン
  // 選択状態
  sel: { charIdx:0, colorIdx:0, botChar:2, botMode:'cpu', confirmed:false },
  versusPlayers: 4,
  countdown:0, countNum:3,
  resultTimer:0,
  // ネット
  net:null, room:null,

  init() {
    this.canvas = document.getElementById('game');
    this.ctx = this.canvas.getContext('2d');
    Input.init();
    this.bindPointers();
    this.resize();
    window.addEventListener('resize', () => this.resize());
    window.addEventListener('orientationchange', () => setTimeout(() => this.resize(), 250));
    // ビジュアルビューポート（アドレスバー開閉）に追従してCanvasを再配置
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => this.resize());
      window.visualViewport.addEventListener('scroll', () => this.resize());
    }
    requestAnimationFrame(() => this.loop());
  },
  resize() {
    // 実表示領域（visualViewport）にぴったり収める。Canvasを可視領域の中央に絶対配置し、
    // スマホ横画面でも下部UI（ボタン）が見切れないようにする
    const vv = window.visualViewport;
    const vw = (vv && vv.width)  || window.innerWidth;
    const vh = (vv && vv.height) || window.innerHeight;
    const offX = (vv && vv.offsetLeft) || 0;
    const offY = (vv && vv.offsetTop)  || 0;
    const cv = this.canvas, wrap = cv.parentElement;
    // CSSのmax-width/height(100%)による高さ圧縮（＝横伸び・タップずれ）を防ぐ。
    // 縦横は下で同じ倍率sを明示指定するのでアスペクト比(16:9)は保たれる。
    cv.style.maxWidth = 'none'; cv.style.maxHeight = 'none';
    // 全体フィット・中央固定・スクロール一切禁止のシーン（対戦中＋タイトル）。
    // それ以外（各選択/説明/リザルト等）は幅にフィットして大きく表示し、縦に収まらなければスクロール可。
    // charselectはカード群を内部スクロールで自己完結させているため、ページスクロールは禁止して全体フィット表示にする
    // （スマホ横画面で内部スクロールとページスクロールが干渉するのを防ぐ）
    const battleView = (this.scene === 'battle' || this.scene === 'countdown' || this.scene === 'title' || this.scene === 'charselect');
    let s;
    if (battleView) {
      s = Math.min(vw / W, vh / H);
      const cw = W * s, ch = H * s;
      cv.style.position = 'fixed';
      cv.style.margin = '0';
      cv.style.left = Math.round(offX + (vw - cw) / 2) + 'px';
      cv.style.top  = Math.round(offY + (vh - ch) / 2) + 'px';
      cv.style.width = cw + 'px';
      cv.style.height = ch + 'px';
      cv.style.touchAction = 'none';        // パン無効＝スクロールさせない
      cv.removeAttribute('data-scroll');
      if (wrap) wrap.scrollTop = 0;
      if (window.scrollX || window.scrollY) window.scrollTo(0, 0);
    } else {
      s = Math.min(vw / W, 1);
      const cw = W * s, ch = H * s;
      cv.style.position = 'static';
      cv.style.left = ''; cv.style.top = '';
      cv.style.margin = '0 auto';
      cv.style.width = cw + 'px';
      cv.style.height = ch + 'px';
      cv.style.touchAction = 'pan-y';       // 縦パン（スクロール）を許可
      cv.setAttribute('data-scroll', '');   // touchmoveハンドラのスクロール許可対象に
      if (wrap) wrap.style.alignItems = (ch <= vh ? 'center' : 'flex-start');  // 収まる時は中央／はみ出す時は上寄せ
    }
    const r = cv.getBoundingClientRect();
    this.scale = s; this.ox = r.left; this.oy = r.top;
  },
  toCanvas(cx, cy) {
    const r = this.canvas.getBoundingClientRect();
    return { x: (cx - r.left) / this.scale, y: (cy - r.top) / this.scale };
  },
  bindPointers() {
    const cv = this.canvas;
    cv.addEventListener('pointerdown', e => {
      Sound.unlock();
      unlockBlindAudio();   // スマホ：最初のタップでBLIND音声を解錠
      const p = this.toCanvas(e.clientX, e.clientY);
      // お絵かきモード中：ボタン以外のドラッグは描画開始
      if (this.scene === 'battle' && this.drawMode) {
        if (this.handleUIClick(p.x, p.y)) return;
        this.strokeStart(e.pointerId, p.x, p.y);
        return;
      }
      if (this.scene === 'charselect') this._csDrag = { y0: p.y, s0: (this.charScroll || 0) };   // ドラッグでスクロール
      if (this.scene === 'battle') Input.onPointerDown(e.pointerId, p.x, p.y);
      this.handleUIClick(p.x, p.y);
    });
    cv.addEventListener('pointermove', e => {
      const p = this.toCanvas(e.clientX, e.clientY);
      if (this.scene === 'battle' && this.drawMode) { this.strokeMove(e.pointerId, p.x, p.y); return; }
      if (this.scene === 'charselect' && this._csDrag) {   // キャラ選択：縦ドラッグでカードをスクロール
        this.charScroll = clamp(this._csDrag.s0 - (p.y - this._csDrag.y0), 0, this._charMaxScroll || 0);
      }
      Input.onPointerMove(e.pointerId, p.x, p.y);
    });
    cv.addEventListener('pointerup',   e => { this._csDrag = null; if (this.drawMode) this.strokeEnd(e.pointerId); Input.onPointerUp(e.pointerId); });
    cv.addEventListener('pointercancel', e => { this._csDrag = null; if (this.drawMode) this.strokeEnd(e.pointerId); Input.onPointerUp(e.pointerId); });
    // マウスホイールでキャラ選択をスクロール
    cv.addEventListener('wheel', e => {
      if (this.scene === 'charselect') {
        this.charScroll = clamp((this.charScroll || 0) + e.deltaY, 0, this._charMaxScroll || 0);
        e.preventDefault();
      }
    }, { passive: false });
  },
  handleUIClick(x, y) {
    if (this._errored) { this._errored = false; this.scene = 'title'; this.world = null; return true; }
    for (const b of this.ui) {
      if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) {
        Sound.play('se_ui_decide'); b.action(x, y); return true;
      }
    }
    return false;
  },
  /* ---- Q2 お絵かき：ストローク管理 ---- */
  strokeStart(id, x, y) { this._stroke = { id, pts: [{ x, y }] }; },
  strokeMove(id, x, y) {
    const s = this._stroke; if (!s || s.id !== id) return;
    const last = s.pts[s.pts.length - 1];
    if (Math.hypot(x - last.x, y - last.y) > 8) s.pts.push({ x, y });   // 8px間隔で点を追加
    if (s.pts.length > 80) s.pts.shift();
  },
  strokeEnd(id) {
    const s = this._stroke; if (!s || s.id !== id) { this._stroke = null; return; }
    this._stroke = null;
    if (s.pts.length >= 2 && this.world) {
      const owner = this.drawMode;
      if (this.world.netRole === 'client') { this._drawSend = { pts: s.pts, seq: (this._drawSeq = (this._drawSeq || 0) + 1) }; }
      else {
        this.world.doodles.push(new Doodle(s.pts, owner)); if (this.world.doodles.length > 10) this.world.doodles.shift();
        if (owner) owner.consumeDrawBudget(strokeLen(s.pts));   // ローカル/ホストは予算を消費
      }
      Sound.play('se_item_close');
      if (owner && !owner.drawing) this.exitDrawMode();   // 予算切れで描画終了したら自動でモード解除
    }
  },
  exitDrawMode() {
    if (this.drawMode) { this.drawMode.endDrawing(); }   // 完了でクールタイム開始（既に終了済みなら何もしない）
    if (this.world && this.world.netRole === 'client') this._endDraw = { seq: (this._endDrawSeq = (this._endDrawSeq || 0) + 1) };
    this.drawMode = null; this._stroke = null;
  },
  drawDrawingUI(ctx) {
    // 描画中のストローク
    if (this._stroke && this._stroke.pts.length) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); this._stroke.pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)); ctx.stroke();
    }
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif';
    ctx.fillText('✏️ ドラッグで線を描く（離すと落ちて転がる）', W/2, 40);
    ctx.fillStyle = '#ff8080'; ctx.font = '16px sans-serif';
    ctx.fillText('描画中は無防備！', W/2, 66);
    this.btn(W - 180, H - 84, 160, 60, '完了', () => this.exitDrawMode(), { color:'#2e8b57', font:26 });
  },
  btn(x, y, w, h, label, action, opts = {}) {
    this.ui.push({ x, y, w, h, label, action, opts });
  },

  /* ---------- メインループ ---------- */
  loop() {
    try {
      // シーンが切り替わったらレイアウト（スクロール可否・拡縮）を更新
      if (this.scene !== this._layoutScene) { this._layoutScene = this.scene; this.resize(); }
      Input.update();
      this.ui = [];
      const ctx = this.ctx;
      ctx.clearRect(0, 0, W, H);
      switch (this.scene) {
        case 'title':      this.sceneTitle(); break;
        case 'mode':       this.sceneModeSelect(); break;
        case 'charselect': this.sceneCharSelect(); break;
        case 'stageselect':this.sceneStageSelect(); break;
        case 'countdown':  this.sceneCountdown(); break;
        case 'battle':     this.sceneBattle(); break;
        case 'result':     this.sceneResult(); break;
        case 'help':       this.sceneHelp(); break;
      }
      this.drawButtons();
    } catch (err) {
      // 例外で「グレー画面のまま無反応」になるのを防ぎ、原因を画面に出す
      this.drawError(err);
      console.error('[スンマ戦] loop error:', err);
    }
    requestAnimationFrame(() => this.loop());
  },

  drawError(err) {
    const ctx = this.ctx;
    ctx.fillStyle = '#220000'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff6b6b'; ctx.textAlign = 'left'; ctx.font = 'bold 28px monospace';
    ctx.fillText('⚠ エラーが発生しました（scene: ' + this.scene + '）', 40, 80);
    ctx.fillStyle = '#fff'; ctx.font = '18px monospace';
    const msg = (err && (err.stack || err.message || String(err))) || 'unknown';
    msg.split('\n').slice(0, 12).forEach((line, i) => ctx.fillText(line.slice(0, 110), 40, 130 + i * 26));
    ctx.fillStyle = '#9fb3d1'; ctx.font = '16px sans-serif';
    ctx.fillText('画面をタップ/クリックでタイトルに戻ります', 40, H - 50);
    this._errored = true;
  },

  drawButtons() {
    const ctx = this.ctx;
    for (const b of this.ui) {
      if (b.opts.bare) continue;          // bareは独自描画
      ctx.fillStyle = b.opts.color || (b.opts.sel ? '#3a6ea5' : '#26324d');
      roundRect(ctx, b.x, b.y, b.w, b.h, 10); ctx.fill();
      ctx.strokeStyle = b.opts.sel ? '#ffd166' : '#4a5a7a'; ctx.lineWidth = b.opts.sel ? 4 : 2; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = (b.opts.font || 26) + 'px sans-serif';
      ctx.fillText(b.label, b.x + b.w / 2, b.y + b.h / 2);
    }
  },

  },

  openCharRequest() {

    } else {

  /* ---------- 操作説明 ---------- */
  sceneHelp() {
    const ctx = this.ctx; bgGradient(ctx);
    ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.font = 'bold 48px sans-serif';
    ctx.fillText('操作説明', W/2, 70);
    const rows = [
      ['左スティック', '移動・方向入力（攻撃の向き）', 'PC: ←→ / W↑ S↓'],
      ['X ボタン', 'ジャンプ（最大3〜4段／キャラ依存）', 'PC: K'],
      ['Y ボタン', '攻撃（素手3段／武器攻撃。方向で技変化）', 'PC: J'],
      ['Y 長押し', ['スマッシュ攻撃（離して発動・方向で5種／溜め中は足が止まる）', 'パワーメーターの値で威力が変化（95%以上で最大ヒット）'], 'PC: J長押し'],
      ['A ボタン', 'アイテムボックス開く→武器を装備', 'PC: L'],
      ['🛡 B ボタン', 'シールド（長押しでガード）', 'PC: B'],
      ['空中スマッシュ', ['空中でスマッシュ入力（Y長押し＋方向・その場で静止）', '上/下は棒が出現・下スマッシュは下方の相手をメテオ'], 'PC: J長押し'],
      ['空中ドッジ / 急降下', ['空中で移動方向＋B＝無敵で回避移動（CT1.5秒）', '空中で下入力（Yなし）＝急降下'], 'PC: B+方向 / S'],
      ['SP ボタン', 'スペシャル：速度2倍10秒／CD20秒', 'PC: Space / Shift'],
    ];
    ctx.textAlign = 'left'; const x0 = W/2 - 440, rowH = 52;

  /* ---------- キャラ選択（設計書 3.2 / 17.3） ---------- */
  sceneCharSelect() {
    const ctx = this.ctx; bgGradient(ctx);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 44px sans-serif';
    ctx.fillText('キャラクター選択', W/2, 70);

    // カード群はスクロール窓の中に描画。キャラが増えても下の決定/カラー等は常に画面内に固定される
    const n = CHAR_ORDER.length, gap = 14, perRow = 8;
    const cw = Math.min(140, Math.floor((W - 80 - (perRow - 1) * gap) / perRow));
    const chd = 128, rowGap = 14;                       // カード高さ・段間
    const rows = Math.ceil(n / perRow);
    const gridWinTop = 92, gridWinBottom = 440;         // スクロール窓の上下端
    const winH = gridWinBottom - gridWinTop;
    const totalGridH = rows * (chd + rowGap) - rowGap;
    const maxScroll = Math.max(0, totalGridH - winH);
    this._charMaxScroll = maxScroll;
    this.charScroll = clamp(this.charScroll || 0, 0, maxScroll);
    const sc = this.charScroll;

    // 窓内にクリップしてカードを描画（窓外のカードは描画・当たり判定ともにスキップ）
    ctx.save();
    ctx.beginPath(); ctx.rect(0, gridWinTop - 2, W, winH + 4); ctx.clip();
    CHAR_ORDER.forEach((cid, i) => {
      const c = CHARS[cid];
      const row = Math.floor(i / perRow), col = i % perRow;
      const inRow = Math.min(perRow, n - row * perRow);          // この段のカード数
      const rowTotal = inRow * cw + (inRow - 1) * gap;
      const x = (W - rowTotal) / 2 + col * (cw + gap);           // 段ごとに中央寄せ
      const y = gridWinTop + row * (chd + rowGap) - sc;
      if (y + chd < gridWinTop || y > gridWinBottom) return;     // 窓外はスキップ
      const selected = this.sel.charIdx === i;
      ctx.fillStyle = selected ? '#2c3e63' : '#1d2840';
      roundRect(ctx, x, y, cw, chd, 12); ctx.fill();
      ctx.strokeStyle = selected ? '#ffd166' : '#3a4a6a'; ctx.lineWidth = selected ? 4 : 2; ctx.stroke();
      // プレビュー棒人間（足元をカード下寄りに）
      ctx.save(); ctx.translate(x + cw/2, y + chd - 20); ctx.scale(0.82, 0.82);
      drawPreviewFighter(ctx, 0, 0, cid, COLORS[this.sel.colorIdx].std);
      ctx.restore();
      // 名前：カード幅に収まるようフォントを自動縮小
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
      let nameFont = 22; ctx.font = 'bold ' + nameFont + 'px sans-serif';
      while (ctx.measureText(c.name).width > cw - 12 && nameFont > 10) { nameFont--; ctx.font = 'bold ' + nameFont + 'px sans-serif'; }
      ctx.fillText(c.name, x + cw/2, y + 24);
      ctx.fillStyle = '#9fb3d1'; ctx.font = '12px sans-serif';
      ctx.fillText('特性:' + c.trait, x + cw/2, y + chd - 8);
      // 当たり判定はスクロール窓内にクランプ（窓外にはみ出た部分が上の戻るボタン等のタップを奪わないように）
      const vy = Math.max(y, gridWinTop), vh = Math.min(y + chd, gridWinBottom) - vy;
      if (vh > 0) this.btn(x, vy, cw, vh, '', () => { this.sel.charIdx = i; Sound.play('se_ui_select'); }, { bare:true });
    });
    ctx.restore();

    // スクロールバー＆▲▼ボタン（窓の右側）。スクロール不要なら非表示
    if (maxScroll > 0) {
      const barX = W - 34, trackY = gridWinTop + 30, trackH = winH - 60;
      ctx.fillStyle = 'rgba(255,255,255,0.10)'; roundRect(ctx, barX, trackY, 8, trackH, 4); ctx.fill();
      const thumbH = Math.max(30, trackH * winH / totalGridH);
      const thumbY = trackY + (trackH - thumbH) * (sc / maxScroll);
      ctx.fillStyle = 'rgba(255,255,255,0.5)'; roundRect(ctx, barX, thumbY, 8, thumbH, 4); ctx.fill();
      const step = chd + rowGap;
      this.btn(barX - 10, gridWinTop, 32, 28, '▲', () => { this.charScroll = clamp((this.charScroll || 0) - step, 0, maxScroll); }, { font:16 });
      this.btn(barX - 10, gridWinBottom - 28, 32, 28, '▼', () => { this.charScroll = clamp((this.charScroll || 0) + step, 0, maxScroll); }, { font:16 });
      ctx.fillStyle = '#7f8db0'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('スクロール／▲▼で全キャラ表示', W/2, gridWinTop + 12);
    }

    // 選択中キャラの説明（固定）
    const selDef = CHARS[CHAR_ORDER[this.sel.charIdx]];
    if (selDef && selDef.desc) {
      ctx.fillStyle = '#9fb3d1'; ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('▶ ' + selDef.name + '：' + selDef.desc, W/2, gridWinBottom + 26);
    }

    // カラーパレット（固定）
    ctx.fillStyle = '#fff'; ctx.font = '20px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('カラー選択', W/2, gridWinBottom + 50);
    const sw = 46, sg = 12, tw = COLORS.length * sw + (COLORS.length - 1) * sg;
    let cx = (W - tw) / 2;
    const palY = gridWinBottom + 62;
    COLORS.forEach((col, i) => {
      const x = cx + i * (sw + sg);
      ctx.fillStyle = col.std; roundRect(ctx, x, palY, sw, sw, 8); ctx.fill();
      if (this.sel.colorIdx === i) { ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.stroke(); }
      this.btn(x, palY, sw, sw, '', () => { this.sel.colorIdx = i; Sound.play('se_ui_select'); }, { bare:true });
    });

    // トレーニング時：ボットの設定（固定）
    const botY = palY + sw + 20;
    if (this.mode === 'training') {
      ctx.fillStyle = '#fff'; ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('ボット設定', W/2, botY);
      this.btn(W/2 - 250, botY + 8, 230, 40, 'ボット:静止', () => { this.sel.botMode = 'static'; }, { sel: this.sel.botMode === 'static' });
      this.btn(W/2 + 20, botY + 8, 230, 40, 'ボット:CPU', () => { this.sel.botMode = 'cpu'; }, { sel: this.sel.botMode === 'cpu' });
    } else {
      ctx.fillStyle = '#9fb3d1'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('対戦: あなた + CPU3体（オンライン未設定のためローカル対戦）', W/2, botY + 6);
    }

    // 決定（→ ステージ選択へ）：常に画面内に固定
    this.btn(W/2 - 130, botY + 58, 260, 56, '決定', () => { this.scene = 'stageselect'; }, { color:'#2e8b57', font:28 });
    this.btn(40, 30, 130, 50, '← 戻る', () => { this.scene = 'title'; }, { font:22 });
  },

  /* ---------- ステージ選択（キャラ選択の後／ホストのみ操作可） ---------- */
  sceneStageSelect() {
    const ctx = this.ctx; bgGradient(ctx);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 44px sans-serif';
    ctx.fillText('ステージ選択', W/2, 72);

    // 4つ以上は2行に折り返してカードが見切れないように
    const n = STAGES.length, gap = 26;
    const perRow = n <= 3 ? n : Math.ceil(n / 2);
    const rows = Math.ceil(n / perRow);
    const cw = Math.min(360, Math.floor((W - 80 - (perRow - 1) * gap) / perRow));
    const ch = rows >= 2 ? 196 : 230;
    const gridTop = 100, rowGap = 22;
    const gridBottom = gridTop + rows * (ch + rowGap) - rowGap;
    STAGES.forEach((s, i) => {
      const row = Math.floor(i / perRow), col = i % perRow;
      const inRow = Math.min(perRow, n - row * perRow);
      const rowTotal = inRow * cw + (inRow - 1) * gap;
      const x = (W - rowTotal) / 2 + col * (cw + gap);
      const y = gridTop + row * (ch + rowGap);
      const selected = this.sel.stageIdx === i;
      // ステージのミニプレビュー（実描画を縮小してカード内にクリップ）
      ctx.save();
      roundRect(ctx, x, y, cw, ch, 12); ctx.clip();
      ctx.translate(x, y); ctx.scale(cw / W, ch / H);
      drawStage(ctx, s);
      ctx.restore();
      ctx.strokeStyle = selected ? '#ffd166' : '#3a4a6a'; ctx.lineWidth = selected ? 5 : 2;
      roundRect(ctx, x, y, cw, ch, 12); ctx.stroke();
      ctx.fillStyle = 'rgba(0,0,0,0.55)'; roundRect(ctx, x, y + ch - 40, cw, 40, 8); ctx.fill();
      ctx.fillStyle = selected ? '#ffd166' : '#fff'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(s.name, x + cw/2, y + ch - 12);
      this.btn(x, y, cw, ch, '', () => { this.sel.stageIdx = i; Sound.play('se_ui_select'); }, { bare:true });
    });

    ctx.fillStyle = '#9fb3d1'; ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('ローカル対戦・トレーニングではホスト（あなた）がステージを選びます', W/2, gridBottom + 28);

    this.btn(W/2 - 130, gridBottom + 48, 260, 60, '対戦スタート', () => this.startMatch(), { color:'#2e8b57', font:28 });
    this.btn(40, 30, 150, 50, '← キャラ選択', () => { this.scene = 'charselect'; }, { font:20 });
  },

  startMatch() {
    applyStage(this.sel.stageIdx);          // 選んだステージを適用（ローカル/トレーニング）
    const charId = CHAR_ORDER[this.sel.charIdx];
    const fighters = [];
    const human = new Fighter(charId, this.sel.colorIdx, { human:true, label:'P1' });
    human.controller = HumanController;
    fighters.push(human);

    if (this.mode === 'training') {
      const bot = new Fighter(CHAR_ORDER[this.sel.botChar], 1, { bot:true, botMode:this.sel.botMode, label:'BOT' });
      bot.controller = new CPUController(this.sel.botMode);
      fighters.push(bot);
    } else {
      const used = new Set([this.sel.colorIdx]);
      for (let i = 1; i < this.versusPlayers; i++) {
        let ci; do { ci = Math.floor(Math.random()*8); } while (used.has(ci) && used.size < 8); used.add(ci);
        const bc = CHAR_ORDER[(this.sel.charIdx + i) % CHAR_ORDER.length];
        const bot = new Fighter(bc, ci, { bot:true, botMode:'cpu', label:'CPU'+i });
        bot.controller = new CPUController('cpu');
        fighters.push(bot);
      }
    }
    this.world = new World(fighters, { training: this.mode === 'training' });
    this.drawMode = null; this._stroke = null;
    this.countdown = 0; this.countNum = 3;
    this.scene = 'countdown';
  },

  /* ========== ネット対戦（ホスト権限同期） ========== */
  // net.js が state==='playing' を検知したら match 情報とともに呼ぶ
  startNetMatch(match, myId, isHost, stageIdx) {
    applyStage(stageIdx || 0);                      // ホストが選んだステージを全員に適用
    const order = Object.values(match);            // [{pid,char,color}] 全クライアント共通順
    const fighters = [];
    this.netControllers = {};                      // pid -> RemoteController（ホスト用）
    order.forEach((m, i) => {
      const isSelf = m.pid === myId;
      const f = new Fighter(m.char, m.color, { human: isSelf, label: 'P' + (i + 1) });
      f.pid = m.pid;
      if (isHost) {
        if (isSelf) { f.controller = HumanController; }
        else { const rc = new RemoteController(); this.netControllers[m.pid] = rc; f.controller = rc; }
      } else {
        // クライアントはシミュレーションしない（スナップショット描画）。controllerは未使用
        f.controller = { poll(){}, dirX(){return 0;}, dir(){return 'none';}, held:{}, edge:{} };
        f.netMode = true;
      }
      fighters.push(f);
    });
    this.world = new World(fighters, { net: true });
    this.world.netRole = isHost ? 'host' : 'client';
    this.world.myIndex = order.findIndex(m => m.pid === myId);
    this.world._origCount = order.length;   // 元プレイヤー数（これ以降のfighterは分身）

    this._netPubTick = 0; this._netInFrame = 0; this._lastInput = '';
    this._netSnap = null; this._ic = { X:0, Y:0, A:0, B:0, SP:0 };

    if (isHost) {
      Net.clearMatchData();                        // 古い入力/スナップショットを掃除
      Net.onInputs((mapOfInputs) => {
        for (const pid in this.netControllers) {
          if (mapOfInputs && mapOfInputs[pid]) this.netControllers[pid].setData(mapOfInputs[pid]);
        }
      });
    } else {
      Net.onSnapshot((snap) => { this._netSnap = snap; });
    }
    this.mode = 'versus';
    this.drawMode = null; this._stroke = null;
    this.countdown = 0; this.countNum = 3; this._lastPhase = -1;
    this.scene = 'countdown';
  },

      pol: world.poles.length ? world.poles.map(p => ({ x: Math.round(p.x), y: Math.round(p.y), t: p.t, max: p.max ? 1 : 0, down: p.down ? 1 : 0, side: p.side ? 1 : 0, face: p.face || 1, sz: p.sizeMul || 1 })) : undefined,
      bl: world.blindTimer > 0 ? world.blindTimer : undefined, blo: world.blindTimer > 0 ? world.blindOwner : undefined, blq: world.blindTimer > 0 ? world.blindQuote : undefined,
      su: world.sunTimer > 0 ? world.sunTimer : undefined, suo: world.sunTimer > 0 ? world.sunOwner : undefined,

  // クライアント：受信スナップショットをfighterへ反映（予測なし）
  applyNetSnapshot(world, snap) {
    const F = snap.f || [];
    const myI = (world.netRole === 'client') ? world.myIndex : -1;
    // 分身（MIRROR）をホストに合わせて生成/削除（クライアントでも見えるように）
    const origCount = world._origCount || world.fighters.length;
    while (world.fighters.length < F.length) {
      const s = F[world.fighters.length];
      const cf = new Fighter(s.cc || world.fighters[0].def.id, s.ccol || 0, { bot: true, dim: true });
      cf.netMode = true; cf.isClone = true;
      world.fighters.push(cf);
    }
    while (world.fighters.length > F.length && world.fighters.length > origCount) world.fighters.pop();
    for (let i = 0; i < world.fighters.length && i < F.length; i++) {
      const f = world.fighters[i], s = F[i];
      if (s.d > f.damage) spawnHitSpark(f.x, f.y - 40);   // 被弾でスパーク
      // ステータス系（常にホスト権威）
      f.state = s.s; f.weapon = s.w; f.damage = s.d; f.stocks = s.k;
      f.spActive = s.spa || 0; f.spCooldown = s.spcd || 0; f.boxOpen = !!s.b; f.boxSel = s.bs || 0;
      f.invuln = s.iv ? 1 : 0; f.respawnTimer = s.rt ? 1 : 0; f.dead = !!s.dd;
      f.shielding = !!s.sh; f.shield = (s.shv != null ? s.shv : f.shieldMax()); f.guardBreak = s.gb ? 1 : 0;
      f.mathFrozen = !!s.mf; f.mathSelecting = !!s.ms; f.mathWrongFlash = s.mwf ? 1 : 0;
      f.mathTargetIdx = s.mti || 0;
      f.timeStopped = s.tstop ? 1 : 0;
      f.slowed = s.slw ? 1 : 0;
      f.drawing = !!s.drw;
      f.superPower = s.spw || 0;
      f.reversed = s.rev ? 1 : 0;
      f.jumpBlocked = s.jb ? 1 : 0;
      f.jumpOnly = s.jo ? 1 : 0;
      f.invisTimer = s.inv ? 1 : 0;
      f.stunned = s.st ? 1 : 0;
      f.heavyTimer = s.hv ? 1 : 0;
      f.boltFlash = s.bf ? 1 : 0;
      f.tinyTimer = s.tn ? 1 : 0;
      f.ironTimer = s.ir ? 1 : 0;
      f.flyTimer = s.fl ? 1 : 0;
      f.poisonTimer = s.ps ? 1 : 0;
      f.reflectTimer = s.rf ? 1 : 0;
      f.reviveReady = !!s.rv;
      f.hasteTimer = s.ha ? 1 : 0;
      f.playdeadTimer = s.pd ? 1 : 0;
      f.haneTimer = s.hn ? 1 : 0;
      f.confusedTimer = s.cf ? 1 : 0;
      f.thornTimer = s.th ? 1 : 0;
      f.lifestealTimer = s.ls ? 1 : 0;
      f.debuffTimer = s.db ? 1 : 0;
      f.chargeReady = !!s.cg;
      f.bounceTimer = s.bn ? 1 : 0;
      f.splitTimer = s.spl ? 1 : 0;
      f.blackholeTimer = s.bh ? 1 : 0;
      f.silencedTimer = s.si ? 1 : 0;
      f.dashBoost = s.db ? 1 : 0;
      f.shatterMode = s.sm ? 1 : 0;
      f.invincible = s.ivc ? 1 : 0;
      f.slipped = s.slip ? 1 : 0;
      f.bombCooldown = s.bcd || 0;
      f.charging = !!s.chg;

  },
  // クライアントで自キャラをローカル予測してよいか（自由状態のみ）
  canPredict(f) {
    if (!f || !f._hostFree || f.charging) return false;   // スマッシュ溜め中は足を止めるので予測しない
    const st = f._hostState || f.state;
    return st === 'idle' || st === 'run' || st === 'jump_up' || st === 'jump_air';
  },

  // クライアント：自分の入力をRTDBへ（変化時 or 一定間隔）
  sendNetInput() {
    const e = Input.edge;
    if (e.X) this._ic.X++; if (e.Y) this._ic.Y++; if (e.A) this._ic.A++;
    if (e.B) this._ic.B++; if (e.SP) this._ic.SP++;
    const h = Input.held;
    const payload = {
      l: h.left ? 1 : 0, r: h.right ? 1 : 0, u: h.up ? 1 : 0, d: h.down ? 1 : 0,
      ax: Math.round(Input.moveX() * 10) * 10,  // アナログ横入力（0.1刻み＝送信スパム抑制）
      sb: h.B ? 1 : 0,                         // シールド（B長押し）の保持状態
      sy: h.Y ? 1 : 0,                         // 攻撃Yの保持状態（スマッシュ溜め検出用）
      cX: this._ic.X, cY: this._ic.Y, cA: this._ic.A, cSP: this._ic.SP,
    };
    if (this._boxPick) { payload.bs = this._boxPick.v; payload.bsSeq = this._boxPick.seq; }
    if (this._mathAns) { payload.ma = this._mathAns.v; payload.maSeq = this._mathAns.seq; }
    if (this._mathTgt) { payload.mt = this._mathTgt.v; payload.mtSeq = this._mathTgt.seq; }
    if (this._drawSend) { payload.dr = this._drawSend.pts.map(p => [Math.round(p.x), Math.round(p.y)]); payload.drSeq = this._drawSend.seq; }
    if (this._endDraw) { payload.edSeq = this._endDraw.seq; }
    const s = JSON.stringify(payload);
    this._netInFrame = (this._netInFrame || 0) + 1;
    if (s !== this._lastInput || this._netInFrame % 2 === 0) { this._lastInput = s; Net.writeInput(payload); }
    this._drawSend = null; this._endDraw = null;   // 大きなストロークは1回送ったら破棄
  },

  // アイテム/算数のUI操作（ローカルは即実行、ネットクライアントは入力で送信）
  pickBox(f, i) {
    const opt = f.boxOptions()[i];
    if (this.world && this.world.netRole === 'client') {
      this._boxPick = { v: i, seq: (this._boxPickSeq = (this._boxPickSeq || 0) + 1) };
      if (opt && opt.type === 'draw') { this.drawMode = f; this._drawConfirmed = false; }   // クライアントでも描画UIを開く（ホスト確認待ち）
    } else { f.boxSel = i; f.applyBoxSelection(this.world); }
  },
  answerMath(f, value) {
    if (this.world && this.world.netRole === 'client') { this._mathAns = { v: value, seq: (this._mathAnsSeq = (this._mathAnsSeq || 0) + 1) }; }
    else { f.submitMathAnswer(value); }
  },
  chooseMathTarget(f, opp, idx) {
    if (this.world && this.world.netRole === 'client') { this._mathTgt = { v: idx, seq: (this._mathTgtSeq = (this._mathTgtSeq || 0) + 1) }; }
    else { f.confirmMathTarget(opp[idx]); }
  },

  leaveNet() {
    if (window.Net && Net.leave) Net.leave();
    if (this.world) { this.world.netRole = null; }
    this.resultTimer = 0; this.scene = 'title';
  },

  /* ---------- カウントダウン（設計書 12） ---------- */
  sceneCountdown() {
    this.sceneBattle(true);              // 背景＆キャラを描画（停止）
    const ctx = this.ctx;
    this.countdown++;
    const phase = Math.floor(this.countdown / 50);
    if (phase !== this._lastPhase) {
      this._lastPhase = phase;
      if (phase < 3) Sound.play('se_countdown');
      else if (phase === 3) Sound.play('se_gong');
    }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const local = this.countdown % 50, scl = 1 + (1 - local/50) * 1.5;
    let txt = '';
    if (phase === 0) txt = '3'; else if (phase === 1) txt = '2'; else if (phase === 2) txt = '1';
    else if (phase === 3) txt = 'start‼';
    ctx.save(); ctx.translate(W/2, H/2 - 60);
    if (phase < 3) ctx.scale(scl, scl);
    ctx.fillStyle = phase === 3 ? '#ffd166' : '#fff';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 12;
    ctx.font = 'bold ' + (phase === 3 ? 90 : 160) + 'px sans-serif';
    ctx.fillText(txt, 0, 0); ctx.restore();
    ctx.shadowBlur = 0;
    if (phase >= 4) { this.scene = 'battle'; this._lastPhase = -1; }
  },

  /* ---------- 対戦（設計書 12/13） ---------- */
  sceneBattle(frozen) {
    const ctx = this.ctx;
    const world = this.world;
    drawStage(ctx);

    const role = world.netRole;     // 'host' | 'client' | undefined（ローカル）
    if (!frozen && world && !world.over) {
      if (role === 'host') {
        Sound.beginCapture();
        world.update();
        this._seEvents = Sound.endCapture();             // このフレームに鳴ったSEを配信に乗せる
        Net.writeSnapshot(this.encodeSnapshot(world));   // 毎フレーム配信（最小遅延・予測なし）
      } else if (role === 'client') {
        this.sendNetInput();                                   // 自分の入力を送信（変化時は即送信）
        if (this._netSnap) this.applyNetSnapshot(world, this._netSnap);
        for (const f of world.fighters) { f.netMode = true; if (f.timeStopped <= 0) f.updateAnim(null); }  // 停止中はアニメも止める
        updateSparks();
      } else {
        world.update();
      }
    }

    // 描画（投射物：クライアントは受信座標、それ以外はローカル）
    if (role === 'client') {
      ctx.fillStyle = '#ffe066';
      for (const pr of (world.netProjectiles || [])) { ctx.beginPath(); ctx.arc(pr.x, pr.y, 5, 0, Math.PI*2); ctx.fill(); }
    } else {
      for (const p of world.projectiles) p.draw(ctx);
    }
    // Q2の白線（落書き）
    if (role === 'client') {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      for (const d of (world.netDoodles || [])) {
        ctx.save(); ctx.translate(d.x, d.y); ctx.rotate((d.a || 0) / 100);
        ctx.beginPath(); (d.p || []).forEach((pt, i) => i ? ctx.lineTo(pt[0], pt[1]) : ctx.moveTo(pt[0], pt[1])); ctx.stroke();
        ctx.restore();
      }
    } else {
      for (const d of world.doodles) d.draw(ctx);
    }
    for (const ba of (role === 'client' ? (world.netBananas || []) : world.bananas)) drawGroundBanana(ctx, ba);
    for (const bo of (role === 'client' ? (world.netBombs || []) : world.bombs)) drawBomb(ctx, bo);
    for (const po of (role === 'client' ? (world.netPoles || []) : world.poles)) drawPole(ctx, po);
    const localIdx = (world.myIndex != null) ? world.myIndex : 0;   // 自分の機体（透明判定用）
    for (let fi = 0; fi < world.fighters.length; fi++) {
      const f = world.fighters[fi];
      if (f.dead || f.respawnTimer > 0) continue;
      if (f.invisTimer > 0) {
        if (fi !== localIdx) continue;                 // toumei：自分以外には見えない
        ctx.save(); ctx.globalAlpha = 0.4; drawCharacter(ctx, f); ctx.restore();   // 自分には半透明で見える
      } else drawCharacter(ctx, f);
    }
    drawSparks(ctx);
    // 時間停止の演出：開始時に画面フラッシュ（ホスト/クライアント共通で検出）
    const anyStop = world.fighters.some(f => f.timeStopped > 0 && !f.dead);
    if (anyStop && !this._wasStop) world.timeStopFlash = 30;
    this._wasStop = anyStop;
    if (world.timeStopFlash > 0) {
      ctx.fillStyle = 'rgba(120,200,255,' + (world.timeStopFlash / 30 * 0.45) + ')';
      ctx.fillRect(0, 0, W, H);
      if (world.timeStopFlash > 18) { ctx.fillStyle = '#bfe6ff'; ctx.font = 'bold 70px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('TIME STOP', W/2, H/2 - 80); }
      world.timeStopFlash--;
    }
    // BLIND：画面妨害の画像（全員に表示／発動者本人だけ半透明）。出た瞬間に音声を再生し、消えたら停止
    const blindOn = world.blindTimer > 0;
    if (blindOn && !this._blindWasOn) playBlindVoice();
    if (!blindOn && this._blindWasOn) stopBlindVoice();
    this._blindWasOn = blindOn;
    if (blindOn) {
      const me = (world.myIndex != null) ? world.fighters[world.myIndex] : world.fighters[0];
      drawBlindOverlay(ctx, (me && me.eid === world.blindOwner) ? 0.4 : 0.92, world.blindQuote);
    }
    // TAIYOU：目つぶし（相手だけ画面が真っ白。発動者本人はうっすら）
    if (world.sunTimer > 0) {
      const meS = (world.myIndex != null) ? world.fighters[world.myIndex] : world.fighters[0];
      const own = meS && meS.eid === world.sunOwner;
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,248,' + (own ? 0.14 : 0.9) + ')';
      ctx.fillRect(0, 0, W, H);
      if (!own) { ctx.fillStyle = '#e8a13a'; ctx.font = 'bold 60px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('☀️ まぶしい！', W/2, H/2); }
      ctx.restore();
    }
    drawHUD(ctx, world);
    // 仮想コントローラ（自分のキャラに対して）。お絵かき中はコントローラを隠して描画UIに
    const localF = (world.myIndex != null) ? world.fighters[world.myIndex] : world.fighters[0];
    if (localF && localF.charging) drawSmashMeter(ctx, localF);   // スマッシュ溜め中：左上にパワーメーター
    if (this.drawMode && (this.drawMode.dead || this.drawMode.respawnTimer > 0)) this.exitDrawMode();  // 描画中にKOされたら解除
    if (this.drawMode) {
      // ホストが描画開始(drawing=true)を確認してから追従。確認前に閉じて固まるのを防ぐ
      if (this.drawMode.drawing) this._drawConfirmed = true;
      else if (this._drawConfirmed) this.exitDrawMode();   // 確認後にdrawing解除＝予算切れ→クライアントも終了
    }
    if (this.drawMode) this.drawDrawingUI(ctx);
    else drawVirtualController(ctx, localF);
    drawMathUI(ctx, world, localF);

    if (role && !this.drawMode) {
      this.btn(W - 110, 16, 94, 44, '退出', () => { this.leaveNet(); }, { font:18 });
    }

    // トレーニング用ボタン
    if (this.world.training) {
      this.btn(W - 360, 16, 160, 44, 'ダメージリセット', () => { for (const f of this.world.fighters) f.damage = 0; }, { font:18 });
      this.btn(W - 190, 16, 80, 44, 'BOT切替', () => {
        const b = this.world.fighters[1];
        const nm = b.controller.mode === 'cpu' ? 'static' : 'cpu';
        b.controller.mode = nm;
      }, { font:16 });
      this.btn(W - 100, 16, 84, 44, 'タイトル', () => { this.scene = 'title'; }, { font:16 });
    }

    if (this.world.over) {
      this.resultTimer = (this.resultTimer || 0) + 1;
      const w = this.world.winner;
      ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#ffd166'; ctx.font = 'bold 80px sans-serif';
      ctx.fillText((w ? w.label + ' (' + w.def.name + ')' : '') + ' WIN！', W/2, H/2 - 20);
      if (this.resultTimer > 120) { this.scene = 'result'; }
    }
  },

  /* ---------- リザルト（設計書 12） ---------- */
  sceneResult() {
    const ctx = this.ctx; bgGradient(ctx);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 60px sans-serif';
    ctx.fillText('リザルト', W/2, 110);
    // 順位：生存→脱落、各群はストック降順（ネット時は placements が無くても成立）
    const order = this.world.fighters.filter(f => !f.isClone).sort((a, b) => {
      if (a.dead !== b.dead) return a.dead ? 1 : -1;
      if (b.stocks !== a.stocks) return b.stocks - a.stocks;
      return a.damage - b.damage;
    });
    order.forEach((f, i) => {
      const y = 200 + i * 80;
      ctx.fillStyle = i === 0 ? '#ffd166' : '#26324d';
      roundRect(ctx, W/2 - 320, y - 32, 640, 64, 10); ctx.fill();
      ctx.fillStyle = i === 0 ? '#1a1a1a' : '#fff'; ctx.textAlign = 'left'; ctx.font = 'bold 30px sans-serif';
      ctx.fillText((i+1) + '位', W/2 - 290, y + 8);
      ctx.fillText(f.label + '  /  ' + f.def.name, W/2 - 180, y + 8);
      ctx.textAlign = 'right';
      ctx.fillText('残ストック ' + f.stocks, W/2 + 290, y + 8);
    });
    // ハンデで優勝したときだけの煽りコメント
    const champ = order[0];
    if (champ && champ.def.id === 'chara_hande') {
      ctx.fillStyle = '#ffd166'; ctx.textAlign = 'center'; ctx.font = 'bold 34px sans-serif';
      ctx.fillText('ハンデつけても勝っちゃうよん', W/2, 540);
    }
    if (this.world.netRole) {
      // ネット対戦：キャラ選択(ロビー)へ戻る / 退出
      const hint = (window.Net && Net.isHost) ? 'キャラ選択へ戻る' : 'キャラ選択へ（ホスト待ち）';
      this.btn(W/2 - 270, 580, 270, 70, hint, () => { this.resultTimer = 0; if (window.Net && Net.returnToLobby) Net.returnToLobby(); }, { color:'#2e8b57', font:24 });
      this.btn(W/2 + 20, 580, 250, 70, '退出してタイトルへ', () => { this.leaveNet(); }, { font:22 });
    } else {
      // ローカル対戦：もう一度 / キャラ選択へ / タイトルへ
      this.btn(W/2 - 345, 580, 220, 70, 'もう一度', () => { this.resultTimer = 0; this.startMatch(); }, { color:'#2e8b57', font:26 });
      this.btn(W/2 - 110, 580, 220, 70, 'キャラ選択へ', () => { this.resultTimer = 0; this.scene = 'charselect'; }, { font:26 });
      this.btn(W/2 + 125, 580, 220, 70, 'タイトルへ', () => { this.resultTimer = 0; this.scene = 'title'; }, { font:26 });
    }
  },
};

/* ======================= 13. 描画ヘルパー ======================= */
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function bgGradient(ctx) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1a2238'); g.addColorStop(1, '#0a0e1a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}
function drawStage(ctx, stage) {
  const st = stage || STAGE, th = st.theme;
  // 背景：空＋シルエット（ステージごとにテーマ色）
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, th.sky[0]); g.addColorStop(0.6, th.sky[1]); g.addColorStop(1, th.sky[2]);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = th.bg;
  for (let i = 0; i < 14; i++) { const bx = i * 95 + 10, bh = 80 + (i*53 % 160); ctx.fillRect(bx, H - bh, 70, bh); }
  // 両サイドの壁（崖）：メイン台より先に描画（壁ラインを中心にした縦バー）
  if (st.walls) {
    const cx = (st.main.x1 + st.main.x2) / 2;
    for (const w of st.walls) {
      ctx.fillStyle = th.wallFill || th.mainFill;
      ctx.fillRect(w.x - 9, w.top, 18, w.bottom - w.top);
      ctx.fillStyle = th.wallEdge || th.mainTop;
      ctx.fillRect(w.x < cx ? w.x + 6 : w.x - 9, w.top, 3, w.bottom - w.top);   // 内側（中央側）を明るく
    }
  }
  // メイン台
  ctx.fillStyle = th.mainFill;
  roundRect(ctx, st.main.x1, st.main.y, st.main.x2 - st.main.x1, 120, 6); ctx.fill();
  ctx.fillStyle = th.mainTop; ctx.fillRect(st.main.x1, st.main.y, st.main.x2 - st.main.x1, 8);
  // 中央台（あるステージのみ）
  if (st.center) {
    ctx.fillStyle = th.centerFill;
    roundRect(ctx, st.center.x1, st.center.y, st.center.x2 - st.center.x1, 16, 6); ctx.fill();
    ctx.fillStyle = th.centerTop; ctx.fillRect(st.center.x1, st.center.y, st.center.x2 - st.center.x1, 4);
  }
}
// HUD（設計書 13）
function drawHUD(ctx, world) {
  const players = world.fighters.filter(f => !f.isClone);   // 分身はHUDに出さない
  const n = players.length, bw = 200, gap = 20;
  const total = n * bw + (n - 1) * gap;
  let sx = (W - total) / 2;
  players.forEach((f, i) => {
    const x = sx + i * (bw + gap), y = 14;
    ctx.fillStyle = f.dead ? 'rgba(40,40,40,0.7)' : 'rgba(20,28,46,0.85)';
    roundRect(ctx, x, y, bw, 78, 10); ctx.fill();
    ctx.strokeStyle = f.color(); ctx.lineWidth = 3; ctx.stroke();
    // 名前
    ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.font = 'bold 18px sans-serif';
    ctx.fillText(f.label + ' ' + f.def.name, x + 12, y + 24);
    // ダメージ%
    ctx.textAlign = 'right';
    const big = f.isHuman;
    ctx.font = 'bold ' + (big ? 38 : 30) + 'px sans-serif';
    ctx.fillStyle = f.dead ? '#888' : (f.damage >= 100 ? '#ff4d4d' : '#fff');  // 100%超で赤（設計書 13）
    ctx.fillText(Math.floor(f.damage) + '%', x + bw - 12, y + 56);
    // ストック（ハート・設計書 13）
    ctx.textAlign = 'left'; ctx.font = '18px sans-serif';
    let hearts = '';
    for (let s = 0; s < 3; s++) hearts += s < f.stocks ? '♥' : '♡';
    ctx.fillStyle = '#ff6b81'; ctx.fillText(hearts, x + 12, y + 56);
    // 装備武器アイコン
    if (f.weapon !== 'bare') { ctx.font = '20px sans-serif'; ctx.textAlign = 'right'; ctx.fillText(WEAPONS[f.weapon].icon, x + bw - 12, y + 24); }
  });
}

/* ---- 仮想コントローラ描画（設計書 4） ---- */
function drawVirtualController(ctx, human) {
  ctx.globalAlpha = 0.85;
  // 左スティック（+25%）
  const sb = { cx: 165, cy: H - 150, r: 100 };
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.beginPath(); ctx.arc(sb.cx, sb.cy, sb.r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 3; ctx.stroke();
  let tx = sb.cx, ty = sb.cy;
  if (Input.stick.active) {
    const m = Math.min(Math.hypot(Input.stick.dx, Input.stick.dy), sb.r);
    const a = Math.atan2(Input.stick.dy, Input.stick.dx);
    tx = sb.cx + Math.cos(a) * m; ty = sb.cy + Math.sin(a) * m;
  }
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.beginPath(); ctx.arc(tx, ty, 45, 0, Math.PI*2); ctx.fill();

  // 右側ボタン群 + SP（設計書 4 の配置・各ボタン+25%）
  const defs = [
    { name:'SP', x: W/2 - 40,  y: H - 95,  r: 58, label:'SP', color:'rgba(255,140,40,0.4)' },
    { name:'X',  x: W - 215,  y: H - 215, r: 53, label:'X' },
    { name:'Y',  x: W - 300,  y: H - 125, r: 53, label:'Y' },
    { name:'A',  x: W - 130,  y: H - 125, r: 53, label:'A' },
    { name:'B',  x: W - 215,  y: H - 62,  r: 53, label:'🛡' },
  ];
  Input.btnRects = {};
  for (const d of defs) {
    Input.btnRects[d.name] = { x: d.x - d.r, y: d.y - d.r, w: d.r*2, h: d.r*2 };
    const pressed = Input.held[d.name];
    ctx.fillStyle = pressed ? 'rgba(255,209,102,0.6)' : (d.color || 'rgba(255,255,255,0.15)');
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold ' + (d.name === 'B' ? 30 : 26) + 'px sans-serif';
    ctx.fillText(d.label, d.x, d.y);
    // SPクールタイム円弧（設計書 8）
    if (d.name === 'SP' && human) {
      if (human.spCooldown > 0) {
        const p = 1 - human.spCooldown / 1200;
        ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r + 6, -Math.PI/2, -Math.PI/2 + p * Math.PI*2); ctx.stroke();
      } else if (human.spActive > 0) {
        ctx.strokeStyle = '#4dff88'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r + 6, 0, Math.PI*2); ctx.stroke();
      }
    }
    // Bボタン：シールド耐久ゲージ
    if (d.name === 'B' && human) {
      ctx.lineWidth = 5;
      if (human.guardBreak > 0) {
        ctx.strokeStyle = '#ff4d4d';
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r + 6, 0, Math.PI*2); ctx.stroke();   // 割れ＝赤満
      } else {
        const sr = Math.max(0, Math.min(1, human.shield / human.shieldMax()));
        ctx.strokeStyle = `hsl(${120 * sr},90%,60%)`;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r + 6, -Math.PI/2, -Math.PI/2 + sr * Math.PI*2); ctx.stroke();
      }
    }
    // Aボタン：固有スキル（時間停止/スロー/算数）のクールタイム表示
    if (d.name === 'A' && human && human.specialCDMax() > 0) {
      const cd = human.specialCD(), max = human.specialCDMax();
      if (cd > 0) {
        const p = 1 - cd / max;
        ctx.strokeStyle = '#ff9f40'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r + 6, -Math.PI/2, -Math.PI/2 + p * Math.PI*2); ctx.stroke();
        ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();  // 暗転＝使用不可
        ctx.fillStyle = '#ffd166'; ctx.font = 'bold 26px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(Math.ceil(cd / 60) + 's', d.x, d.y);   // 残り秒数
      } else {
        ctx.strokeStyle = '#4dff88'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(d.x, d.y, d.r + 6, 0, Math.PI*2); ctx.stroke();   // 準備OK＝緑リング
      }
    }
  }
  ctx.globalAlpha = 1;
  ctx.textBaseline = 'alphabetic';

  // アイテムボックスUI（開いている時・設計書 7）
  if (human && human.boxOpen) drawItemBox(ctx, human);
}
function drawItemBox(ctx, f) {
  const items = f.boxOptions();
  const perRow = 3, rows = Math.ceil(items.length / perRow);
  // 約30%拡大
  const iw = 170, ih = 78, ig = 21, rowH = 94;
  const bw = 936, bh = 140 + rows * rowH, bx = (W - bw)/2, by = 120;
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#1d2840'; roundRect(ctx, bx, by, bw, bh, 16); ctx.fill();
  ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 3; ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 34px sans-serif';
  ctx.fillText('アイテムボックス', W/2, by + 46);
  items.forEach((it, i) => {
    const col = i % perRow, row = Math.floor(i / perRow);
    const x = W/2 - (perRow*iw + (perRow-1)*ig)/2 + col*(iw+ig);
    const y = by + 74 + row*rowH;
    const sel = f.boxSel === i;
    const special = (it.type === 'math' || it.type === 'time' || it.type === 'slow');
    const isBomb = (it.type === 'weapon' && it.weapon === 'bomb');
    const cd = special ? f.specialCD() : (isBomb ? f.bombCooldown : 0);   // 残りクールタイム
    const onCD = cd > 0;
    ctx.fillStyle = special ? (sel ? '#7a5fae' : '#4a3a6a') : (sel ? '#3a6ea5' : '#26324d');
    roundRect(ctx, x, y, iw, ih, 10); ctx.fill();
    if (sel) { ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 4; ctx.stroke(); }
    // アイコン（上）とラベル（下）を別々に中央寄せ（絵文字の幅ずれで右に寄るのを防ぐ）
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.font = '26px sans-serif'; ctx.fillText(it.icon, x + iw/2, y + 30);
    ctx.font = '17px sans-serif'; ctx.fillText(it.label, x + iw/2, y + 56);
    if (onCD) {  // クールタイム中：暗転＋残り秒数＋下に進捗バー
      ctx.fillStyle = 'rgba(0,0,0,0.55)'; roundRect(ctx, x, y, iw, ih, 10); ctx.fill();
      ctx.fillStyle = '#ff9f40'; ctx.font = 'bold 22px sans-serif';
      ctx.fillText('CT ' + Math.ceil(cd / 60) + 's', x + iw/2, y + ih/2 + 8);
      const cmax = isBomb ? BOMB_CD : (f.specialCDMax() || 1);
      ctx.fillStyle = '#ff9f40'; ctx.fillRect(x + 10, y + ih - 9, (iw - 20) * (1 - cd / cmax), 5);   // 残量バー
    } else if (special || isBomb) {  // 準備OK
      ctx.fillStyle = '#4dff88'; ctx.font = '13px sans-serif';
      ctx.fillText('READY', x + iw/2, y + ih - 10);
    }
    // タッチ：セルを直接タップで選択＆実行
    Game.btn(x, y, iw, ih, '', () => Game.pickBox(f, i), { bare:true });
  });
  ctx.fillStyle = '#9fb3d1'; ctx.font = '20px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('タップ または ←→で選択 / A=決定', W/2, by + bh - 18);
}

// 算数（mathキャラ）UI：問題表示／回答ボタン／対象選択（すべてタップ対応）
function drawMathUI(ctx, world, localF) {
  // 出題中のキャラ頭上に問題
  for (const f of world.fighters) {
    if (f.mathFrozen && f.mathProblem && !f.dead && f.respawnTimer <= 0) {
      const tx = f.x, ty = f.y - 92, txt = f.mathProblem.text + ' = ?';
      ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
      const w = ctx.measureText(txt).width + 28;
      ctx.fillStyle = f.mathWrongFlash > 0 ? 'rgba(200,40,40,0.92)' : 'rgba(20,28,46,0.92)';
      roundRect(ctx, tx - w/2, ty - 24, w, 36, 8); ctx.fill();
      ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.fillText(txt, tx, ty);
    }
  }
  if (!localF) return;
  // 自分が出題されている（人間）→ 回答パネル
  if (localF.mathFrozen && localF.mathProblem) {
    const p = localF.mathProblem;
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff'; ctx.font = 'bold 28px sans-serif';
    ctx.fillText('正解するまで動けない！', W/2, 130);
    ctx.fillStyle = '#ffd166'; ctx.font = 'bold 56px sans-serif';
    ctx.fillText(p.text + ' = ?', W/2, 210);
    const ch = p.choices || [], bw = 150, gap = 20, total = ch.length * bw + (ch.length - 1) * gap;
    const sx = (W - total) / 2;
    ch.forEach((c, i) => Game.btn(sx + i * (bw + gap), 250, bw, 84, String(c), () => Game.answerMath(localF, c), { color:'#2e8b57', font:38 }));
    if (localF.mathWrongFlash > 0) { ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 24px sans-serif'; ctx.fillText('✗ 不正解！次の問題へ', W/2, 380); }
  }
  // 自分がmathキャラで対象選択中 → 相手を選ぶ
  if (localF.mathSelecting) {
    const opp = world.fighters.filter(f => f !== localF && !f.dead);
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = 'bold 30px sans-serif';
    ctx.fillText('🧮 誰に算数を出す？', W/2, 170);
    const bw = 220, gap = 20, total = opp.length * bw + (opp.length - 1) * gap;
    const sx = (W - total) / 2;
    opp.forEach((o, i) => {
      const sel = (((localF.mathTargetIdx % opp.length) + opp.length) % opp.length) === i;
      Game.btn(sx + i * (bw + gap), 220, bw, 90, o.label + ' / ' + o.def.name, () => Game.chooseMathTarget(localF, opp, i), { color: sel ? '#7a5fae' : '#4a3a6a', font:22 });
    });
    Game.btn(W/2 - 100, 350, 200, 56, 'キャンセル', () => { localF.mathSelecting = false; }, { font:22 });
  }
}
// キャラ選択プレビュー用の簡易棒人間
function drawPreviewFighter(ctx, x, y, charId, color) {
  if (charId === 'chara_banana') {
    ctx.save(); ctx.translate(x, y);
    const HW = 12, H = 60;
    const grad = ctx.createLinearGradient(-HW, 0, HW, 0);
    grad.addColorStop(0, '#d9a915'); grad.addColorStop(0.45, '#ffe14d'); grad.addColorStop(1, '#caa00f');
    ctx.fillStyle = grad; ctx.strokeStyle = '#6e5300'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
    roundRect(ctx, -HW, -H, HW * 2, H, HW); ctx.fill(); ctx.stroke();
    ctx.strokeStyle = '#5a4500'; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, -H); ctx.lineTo(0, -H - 8); ctx.stroke();
    ctx.fillStyle = '#3a2a00';
    ctx.beginPath(); ctx.arc(-4, -H + 18, 2.4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(4, -H + 18, 2.4, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    return;
  }
  ctx.save(); ctx.translate(x, y); ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap = 'round';
  drawLeg(ctx, -5, -25, 8, 8, 13, 12);
  drawLeg(ctx, 5, -25, -8, 8, 13, 12);
  ctx.beginPath(); ctx.moveTo(0, -25); ctx.lineTo(0, -53); ctx.stroke();
  drawArm(ctx, 0, -49, 25, 20); drawArm(ctx, 0, -49, -25, 20);
  ctx.beginPath(); ctx.arc(0, -65, 12, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
}

/* ======================= 14. 起動 ======================= */
window.SunmaGame = Game;
// net.js（別スクリプト）から参照するデータを公開
window.SunmaData = { CHARS, CHAR_ORDER, COLORS, STAGES, RemoteController };
// load イベントを待たずに確実に起動（タイミング差で初期化漏れ＝グレー画面になるのを防ぐ）
function bootSunma() {
  if (Game._booted) return;
  try {
    if (!document.getElementById('game')) { setTimeout(bootSunma, 30); return; }
    Game._booted = true;
    Game.init();
  } catch (err) {
    Game._booted = false;
    console.error('[スンマ戦] init error:', err);
    const cv = document.getElementById('game');
    if (cv) {
      const ctx = cv.getContext('2d');
      ctx.fillStyle = '#220000'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 24px monospace';
      ctx.fillText('初期化エラー: ' + (err.message || err), 40, 80);
    }
  }
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bootSunma);
else bootSunma();
window.addEventListener('load', bootSunma);
